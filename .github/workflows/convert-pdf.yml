name: Convert Markdown to PDF

on:
  push:
    branches: [main]
  workflow_dispatch:  # 也可以手動觸發

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Install Pandoc & XeLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-latex-recommended texlive-latex-extra texlive-lang-chinese

      - name: Setup BiauKai font & header
        run: |
          # Create a CI-specific header.tex that uses absolute path to font
          FONT_DIR="${GITHUB_WORKSPACE}/fonts"
          cat > /tmp/header-ci.tex << EOF
          \usepackage{xeCJK}
          \setCJKmainfont[
            Path = ${FONT_DIR}/,
            Extension = .ttc,
            FontIndex = 0,
            Scale = 1.25
          ]{BiauKai}
          \setmainfont[
            Path = ${FONT_DIR}/,
            Extension = .ttc,
            FontIndex = 0,
            Scale = 1.25
          ]{BiauKai}
          \XeTeXlinebreaklocale "zh"
          \XeTeXlinebreakskip = 0pt plus 1pt minus 0.1pt
          \XeTeXlinebreakpenalty = 0
          \xeCJKsetup{CJKecglue = {\hskip 0.15em plus 0.08em minus 0.08em}}
          EOF
          echo "=== header-ci.tex ==="
          cat /tmp/header-ci.tex

      - name: Convert 共通性 to PDF
        run: |
          mkdir -p pdf/共通性
          cd 共通性
          for f in *.md; do
            echo "Converting: $f"
            pandoc "$f" -o "../pdf/共通性/${f%.md}.pdf" \
              --pdf-engine=xelatex \
              -H /tmp/header-ci.tex \
              -V fontsize=18pt \
              -V geometry:margin=2cm \
              --resource-path=. \
              || echo "⚠️ FAILED: $f"
          done

      - name: Convert 活動績效 to PDF
        run: |
          mkdir -p pdf/活動績效
          cd 活動績效
          for f in *.md; do
            echo "Converting: $f"
            pandoc "$f" -o "../pdf/活動績效/${f%.md}.pdf" \
              --pdf-engine=xelatex \
              -H /tmp/header-ci.tex \
              -V fontsize=12pt \
              -V geometry:margin=2cm \
              --resource-path=. \
              || echo "⚠️ FAILED: $f"
          done

      - name: Convert 簡報 to PDF
        run: |
          mkdir -p pdf/簡報
          cd 簡報
          for f in *.md; do
            echo "Converting: $f"
            pandoc "$f" -o "../pdf/簡報/${f%.md}.pdf" \
              --pdf-engine=xelatex \
              -H /tmp/header-ci.tex \
              -V fontsize=12pt \
              -V geometry:margin=2cm \
              --resource-path=. \
              || echo "⚠️ FAILED: $f"
          done

      - name: List generated PDFs
        run: |
          echo "=== Generated PDFs ==="
          find pdf -name "*.pdf" -exec ls -lh {} \;
          TOTAL=$(find pdf -name '*.pdf' | wc -l)
          echo "Total: $TOTAL files"
          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No PDFs were generated!"
            exit 1
          fi

      - name: Deploy to pdf branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pdf
          publish_branch: pdf
          commit_message: "📄 Auto-generated PDFs from ${{ github.sha }}"
